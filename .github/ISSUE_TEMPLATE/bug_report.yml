name: Bug Report
description: Report a bug or issue
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Web (Desktop)
        - Web (Mobile)
        - PWA
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: e.g. Chrome 120, Safari 17.2, Firefox 121
    validations:
      required: false

  - type: input
    id: server
    attributes:
      label: Server software
      placeholder: e.g. Navidrome 0.53, Airsonic, Gonic
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console errors (if any)
      description: Open browser DevTools (F12) → Console tab → paste any errors
      render: shell
    validations:
      required: false
